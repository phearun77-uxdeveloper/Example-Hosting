<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Flexbox Image Gallery</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <header>
        <h1>Flexbox Image Gallery</h1>
        <p>Resizes to 4/2/1 layout across desktop/tablet/mobile.</p>
    </header>

    <main>
        <section class="gallery" aria-label="Image gallery">
            <figure class="item">
                <img src="https://www.w3schools.com/w3images/wedding.jpg" alt="Wedding scene">
                <figcaption class="caption">Wedding</figcaption>
            </figure>

            <figure class="item">
                <img src="https://www.w3schools.com/w3images/rocks.jpg" alt="Rock formation by the sea">
                <figcaption class="caption">Rocks</figcaption>
            </figure>

            <figure class="item">
                <img src="https://www.w3schools.com/w3images/underwater.jpg" alt="Underwater coral reef">
                <figcaption class="caption">Underwater</figcaption>
            </figure>

            <figure>
                <img src="https://www.w3schools.com/w3images/ocean.jpg" alt="Ocean waves">
                <figcaption class="caption">Ocean</figcaption>
            </figure>
        </section>

    </main>
</body>
</html>
